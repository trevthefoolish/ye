      Absolute vapour, says the Teacher,
      absolute vapour. Everything is vapour.

                                    Ecclesiastes 1:2


      Hevel, that morning mist above the garden,
      the breath God breathed into clay
      and it became life.

      Hevel, the same word that drifts
      through Ecclesiastes, reminding us
      our days are like vapour rising at dawn.

      Yet the one who shaped the first breath
      stepped into our fleeting mist himself.
      Jesus took on hevel flesh,
      lived our vapour days,
      and in his dying and rising
      made the transient eternal.

      What seems to vanish
      is now held in his hands.
      Every breath becomes part of the story
      that never ends.
